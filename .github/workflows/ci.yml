name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

# Skip Playwright's browser download on install — the E2E job uses system Chrome.
env:
  PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD: '1'

jobs:
  check:
    name: typecheck · lint · unit · build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run typecheck
      - run: npm run lint
      - run: npm run format:check
      - run: npm run test:unit
      - run: npm run build
      - run: npm run test:package # packs, installs the tarball in a temp project, verifies exports/files/version

  e2e:
    # Sharded across parallel runners — each runs 1/N of the specs, so the wall
    # clock is ~total/N instead of the whole suite serially.
    name: Playwright ${{ matrix.shard }}/3
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        shard: [1, 2, 3]
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - uses: browser-actions/setup-chrome@v2 # provides the `chrome` channel Playwright uses
      - run: npm test -- --shard=${{ matrix.shard }}/3
      - uses: actions/upload-artifact@v4
        if: failure() # only keep the report when the suite fails
        with:
          name: playwright-report-${{ matrix.shard }}
          path: playwright-report/
          retention-days: 7

name: Publish create-a4ui

# Publishes the `create-a4ui` scaffolder (separate package from @a4ui/core) via
# npm "trusted publishing" (OIDC) — no token, no OTP, same as publish.yml. This
# requires a Trusted Publisher configured for `create-a4ui` on npmjs.com pointing
# at this repo + this exact workflow filename (publish-create-a4ui.yml).
on:
  workflow_dispatch:

permissions:
  contents: read
  id-token: write # required for npm trusted publishing (OIDC)

jobs:
  publish:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: create-a4ui
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 22
          registry-url: 'https://registry.npmjs.org'
      - run: npm install -g npm@latest # OIDC trusted publishing needs npm 11.5+
      - run: npm publish --provenance --access public

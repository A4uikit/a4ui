name: Publish create-a4ui

# Publishes the `create-a4ui` scaffolder (separate package from @a4ui/core) via
# npm "trusted publishing" (OIDC) — same mechanism as publish.yml, no token or
# OTP. npm must have a trusted publisher configured for `create-a4ui` (repo +
# this workflow); for a brand-new package that's a one-time setup on npmjs.com.
on:
  workflow_dispatch:

permissions:
  contents: read
  id-token: write # required for npm trusted publishing (OIDC)

jobs:
  publish:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: create-a4ui
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 22
          registry-url: 'https://registry.npmjs.org'
      - run: npm install -g npm@latest # OIDC trusted publishing needs npm 11.5+
      - run: npm publish --provenance --access public

name: Publish create-a4ui

# Bootstrap publish of the `create-a4ui` scaffolder using an npm Automation token
# (NPM_TOKEN secret), because a brand-new package can't use OIDC yet (npm has no
# trusted publisher for it until it exists). AFTER the first publish + configuring
# a Trusted Publisher on npmjs.com (repo A4uikit/a4ui + this workflow filename),
# switch this back to OIDC (drop the NODE_AUTH_TOKEN env, add `npm i -g npm@latest`).
on:
  workflow_dispatch:

permissions:
  contents: read
  id-token: write # for --provenance

jobs:
  publish:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: create-a4ui
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 22
          registry-url: 'https://registry.npmjs.org'
      - run: npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

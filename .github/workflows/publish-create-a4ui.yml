name: Publish create-a4ui

# Publishes the `create-a4ui` scaffolder (separate package from @a4ui/core).
# @a4ui/core uses OIDC trusted publishing, but a brand-new package can't (npm
# has no trusted publisher for it yet, and OIDC can't bootstrap one → 404). So
# the FIRST publish uses an npm **Automation** token (the type that bypasses 2FA
# — a plain "Publish" token errors with EOTP in CI). One-time setup: create an
# Automation token on npmjs.com and add it as the `NPM_TOKEN` repo secret, then
# run this workflow. (Once the package exists, you can switch to OIDC like core.)
on:
  workflow_dispatch:

permissions:
  contents: read
  id-token: write # for --provenance

jobs:
  publish:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: create-a4ui
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 22
          registry-url: 'https://registry.npmjs.org'
      - run: npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

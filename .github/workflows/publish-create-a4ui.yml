name: Publish create-a4ui

# Publishes the `create-a4ui` scaffolder via npm "trusted publishing" (OIDC) —
# no token, same as publish.yml. The bootstrap (first) publish was done with an
# Automation token; from now on this uses OIDC. It needs a Trusted Publisher
# configured on npmjs.com for `create-a4ui` → GitHub Actions, repo A4uikit/a4ui,
# workflow filename `publish-create-a4ui.yml`.
on:
  workflow_dispatch:

permissions:
  contents: read
  id-token: write # required for npm trusted publishing (OIDC)

jobs:
  publish:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: create-a4ui
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 22
          registry-url: 'https://registry.npmjs.org'
      - run: npm install -g npm@latest # OIDC trusted publishing needs npm 11.5+
      - run: npm publish --provenance --access public

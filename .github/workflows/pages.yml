name: Deploy docs to GitHub Pages

# Builds the a4ui docs site (preview/) and deploys it to GitHub Pages.
# The site is a Vite SPA with hash routing, served under /a4ui/.
on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# One deployment at a time; newer pushes cancel in-flight runs.
concurrency:
  group: pages
  cancel-in-progress: true

env:
  # This workflow only builds the site — no Playwright browsers needed.
  PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD: '1'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - name: Build docs site
        run: npm run preview:build -- --base=/a4ui/
      - uses: actions/upload-pages-artifact@v3
        with:
          path: preview/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4

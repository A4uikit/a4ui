<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>A4ui — Spatial Glass · design system for SolidJS</title>
    <meta
      name="description"
      content="A4ui — SolidJS design system & component library with a Spatial Glass look (glassmorphism + starfield backdrop + light/dark themes)."
    />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://a4ui.pages.dev/" />
    <meta property="og:title" content="A4ui — Spatial Glass design system for SolidJS" />
    <meta
      property="og:description"
      content="75+ SolidJS components with a glassmorphism + starfield look, light/dark themes, motion, and live docs."
    />
    <meta property="og:image" content="https://a4ui.pages.dev/og.png" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="A4ui — Spatial Glass design system for SolidJS" />
    <meta name="twitter:image" content="https://a4ui.pages.dev/og.png" />

    <!-- PWA: installable (Add to Home Screen). iOS uses the apple-* tags +
         apple-touch-icon; Android/desktop use the manifest + service worker. -->
    <link rel="manifest" href="/manifest.webmanifest" />
    <meta name="theme-color" content="#0a0e17" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="A4ui" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <link
      rel="icon"
      href="data:image/svg+xml,%3Csvg%20xmlns='http://www.w3.org/2000/svg'%20viewBox='0%200%2032%2032'%3E%3Crect%20width='32'%20height='32'%20rx='7'%20fill='%23156bf4'/%3E%3Ctext%20x='16'%20y='22'%20font-family='system-ui,sans-serif'%20font-size='15'%20font-weight='700'%20fill='white'%20text-anchor='middle'%3EA4%3C/text%3E%3C/svg%3E"
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <!-- Load fonts async so they don't block first paint (better FCP/LCP). -->
    <link
      rel="preload"
      as="style"
      href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=IBM+Plex+Sans:wght@400;500;600;700&display=swap"
    />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=IBM+Plex+Sans:wght@400;500;600;700&display=swap"
      media="print"
      onload="this.media = 'all'"
    />
    <noscript>
      <link
        rel="stylesheet"
        href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=IBM+Plex+Sans:wght@400;500;600;700&display=swap"
      />
    </noscript>
  </head>
  <body>
    <div id="root">
      <!-- Instant splash: a zero-JS SKELETON of the real layout so an SPA
           cold-load (slow mobile / cellular) previews the page immediately
           instead of a blank screen. Mirrors the look of our <Skeleton>
           (pulsing muted blocks). main.tsx removes #app-splash once the app
           mounts. -->
      <div id="app-splash" style="position: fixed; inset: 0; background: #0a0e17; overflow: hidden">
        <!-- topbar -->
        <div class="sk-bar">
          <div class="sk sk-logo"></div>
          <div class="sk sk-nav"></div>
          <div class="sk sk-nav"></div>
          <div style="flex: 1"></div>
          <div class="sk sk-ctl"></div>
          <div class="sk sk-ctl"></div>
        </div>
        <!-- hero -->
        <div class="sk-hero">
          <div class="sk" style="width: 150px; height: 22px; border-radius: 999px"></div>
          <div class="sk" style="width: 220px; height: 52px"></div>
          <div class="sk" style="width: min(90%, 460px); height: 14px"></div>
          <div class="sk" style="width: min(75%, 380px); height: 14px"></div>
          <div style="display: flex; gap: 12px; margin-top: 10px">
            <div class="sk" style="width: 170px; height: 44px"></div>
            <div class="sk" style="width: 110px; height: 44px"></div>
          </div>
        </div>
        <!-- stat cards -->
        <div class="sk-cards">
          <div class="sk sk-card"></div>
          <div class="sk sk-card"></div>
          <div class="sk sk-card"></div>
          <div class="sk sk-card"></div>
        </div>
      </div>
      <style>
        #app-splash .sk {
          background: rgba(255, 255, 255, 0.06);
          border-radius: 8px;
          animation: a4pulse 1.6s ease-in-out infinite;
        }
        #app-splash .sk-bar {
          height: 56px;
          display: flex;
          align-items: center;
          gap: 16px;
          padding: 0 20px;
          border-bottom: 1px solid rgba(255, 255, 255, 0.06);
        }
        #app-splash .sk-logo {
          width: 58px;
          height: 24px;
        }
        #app-splash .sk-nav {
          width: 48px;
          height: 16px;
        }
        #app-splash .sk-ctl {
          width: 90px;
          height: 30px;
        }
        #app-splash .sk-hero {
          max-width: 640px;
          margin: 72px auto 0;
          padding: 0 20px;
          display: flex;
          flex-direction: column;
          align-items: center;
          gap: 16px;
        }
        #app-splash .sk-cards {
          max-width: 940px;
          margin: 48px auto 0;
          padding: 0 20px;
          display: grid;
          grid-template-columns: repeat(2, 1fr);
          gap: 16px;
        }
        #app-splash .sk-card {
          height: 104px;
          border-radius: 14px;
        }
        @media (min-width: 640px) {
          #app-splash .sk-cards {
            grid-template-columns: repeat(4, 1fr);
          }
        }
        @media (max-width: 480px) {
          #app-splash .sk-nav,
          #app-splash .sk-ctl:first-of-type {
            display: none;
          }
        }
        @keyframes a4pulse {
          0%,
          100% {
            opacity: 1;
          }
          50% {
            opacity: 0.45;
          }
        }
      </style>
    </div>
    <script type="module" src="/main.tsx"></script>
  </body>
</html>

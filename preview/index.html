<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>A4ui — Spatial Glass · design system for SolidJS</title>
    <meta
      name="description"
      content="A4ui — SolidJS design system & component library with a Spatial Glass look (glassmorphism + starfield backdrop + light/dark themes)."
    />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://a4uikit.github.io/a4ui/" />
    <meta property="og:title" content="A4ui — Spatial Glass design system for SolidJS" />
    <meta
      property="og:description"
      content="~40 SolidJS components with a glassmorphism + starfield look, light/dark themes, and live docs."
    />
    <meta property="og:image" content="https://a4uikit.github.io/a4ui/og.png" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="A4ui — Spatial Glass design system for SolidJS" />
    <meta name="twitter:image" content="https://a4uikit.github.io/a4ui/og.png" />
    <link
      rel="icon"
      href="data:image/svg+xml,%3Csvg%20xmlns='http://www.w3.org/2000/svg'%20viewBox='0%200%2032%2032'%3E%3Crect%20width='32'%20height='32'%20rx='7'%20fill='%23156bf4'/%3E%3Ctext%20x='16'%20y='22'%20font-family='system-ui,sans-serif'%20font-size='15'%20font-weight='700'%20fill='white'%20text-anchor='middle'%3EA4%3C/text%3E%3C/svg%3E"
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <!-- Load fonts async so they don't block first paint (better FCP/LCP). -->
    <link
      rel="preload"
      as="style"
      href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=IBM+Plex+Sans:wght@400;500;600;700&display=swap"
    />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=IBM+Plex+Sans:wght@400;500;600;700&display=swap"
      media="print"
      onload="this.media = 'all'"
    />
    <noscript>
      <link
        rel="stylesheet"
        href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=IBM+Plex+Sans:wght@400;500;600;700&display=swap"
      />
    </noscript>
  </head>
  <body>
    <div id="root">
      <!-- Instant splash: painted with zero JS so an SPA cold-load (slow mobile /
           cellular) shows the brand immediately instead of a blank page. main.tsx
           removes #app-splash the moment the app mounts. -->
      <div
        id="app-splash"
        style="position: fixed; inset: 0; display: grid; place-items: center; background: #0a0e17"
      >
        <div style="display: flex; flex-direction: column; align-items: center; gap: 16px">
          <div
            style="
              width: 46px;
              height: 46px;
              border-radius: 11px;
              background: #156bf4;
              display: grid;
              place-items: center;
              font:
                700 20px/1 system-ui,
                sans-serif;
              color: #fff;
            "
          >
            A4
          </div>
          <div
            style="
              width: 26px;
              height: 26px;
              border: 3px solid rgba(255, 255, 255, 0.18);
              border-top-color: #156bf4;
              border-radius: 50%;
              animation: a4splin 0.7s linear infinite;
            "
          ></div>
        </div>
      </div>
      <style>
        @keyframes a4splin {
          to {
            transform: rotate(360deg);
          }
        }
      </style>
    </div>
    <script type="module" src="/main.tsx"></script>
  </body>
</html>
